<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #f1c40f; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #aaaaaa; }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #2c2c2c;
            color: white;
            font-size: 18px;
            box-sizing: border-box;
        }
        input:focus { outline: 2px solid #f1c40f; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #f1c40f;
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #d4ac0d; }
        .result-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .value-text { font-size: 18px; margin-bottom: 5px; }
        .percentage-text {
            font-size: 32px;
            font-weight: bold;
            color: #4cd137; /* Green color for good ROI */
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pack Yield Calculator</h2>

        <div class="input-group">
            <label>Pack Cost (£)</label>
            <input type="number" id="cost" placeholder="e.g. 10" step="any">
        </div>

        <div class="input-group">
            <label>Ending Amount / Profit (£)</label>
            <input type="number" id="ending" placeholder="e.g. -1" step="any">
        </div>

        <button onclick="calculate()">Calculate</button>

        <div class="result-box" id="resultBox" style="display: none;">
            <div class="value-text" id="cardValueDisplay">Cards Pulled: £0.00</div>
            <div class="percentage-text" id="percentageDisplay">0%</div>
        </div>
    </div>

    <script>
        function calculate() {
            const cost = parseFloat(document.getElementById('cost').value);
            const ending = parseFloat(document.getElementById('ending').value);

            // Error check
            if (isNaN(cost) || isNaN(ending) || cost <= 0) {
                alert("Please enter valid numbers. Cost must be greater than 0.");
                return;
            }

            // Math
            const cardValue = cost + ending;
            const recoveryRate = ((ending / cost) + 1) * 100;

            // Display
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('cardValueDisplay').innerText = `Cards Pulled: £${cardValue.toFixed(2)}`;

            const pctDisplay = document.getElementById('percentageDisplay');
            // Round to 1 decimal place max (e.g. 90% or 45.5%)
            pctDisplay.innerText = `${parseFloat(recoveryRate.toFixed(1))}%`;

            // Change color to red if the percentage is negative
            if (recoveryRate < 0) {
                pctDisplay.classList.add('negative');
            } else {
                pctDisplay.classList.remove('negative');
            }
        }
    </script>
</body>
</html>
